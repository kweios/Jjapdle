<!DOCTYPE html>

<title>꼬들 무한 모드</title>
<style>
    body {
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #ffffff;
        margin: 0;
        padding: 20px;
        touch-action: manipulation;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 400px;
        margin-bottom: 30px;
    }
    .title {
        font-size: 24px;
        font-weight: bold;
    }
    .refresh-btn {
        font-size: 28px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 5px;
        color: #1a1a1b;
    }
    .grid {
        display: grid;
        grid-template-rows: repeat(6, 1fr);
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        margin-bottom: 40px;
    }
    .cell {
        width: 50px;
        height: 50px;
        border: 2px solid #d3d6da;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        font-weight: bold;
        color: #1a1a1b;
        box-sizing: border-box;
    }
    .cell.filled { border-color: #878a8c; }
    /* 요청한 색상으로 변경됨 */
    .cell.correct { background-color: #22C55E; border-color: #22C55E; color: white; }
    .cell.present { background-color: #EAB307; border-color: #EAB307; color: white; }
    .cell.absent { background-color: #94A3B7; border-color: #94A3B7; color: white; }
    
    .keyboard {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        max-width: 400px;
    }
    .row {
        display: flex;
        justify-content: center;
        gap: 6px;
    }
    .key {
        background-color: #d3d6da;
        border: none;
        border-radius: 4px;
        height: 58px;
        min-width: 32px;
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        color: #1a1a1b;
        user-select: none;
    }
    .key.large {
        flex: 1.5;
        font-size: 16px;
    }
    /* 요청한 색상으로 변경됨 */
    .key.correct { background-color: #22C55E; color: white; }
    .key.present { background-color: #EAB307; color: white; }
    .key.absent { background-color: #94A3B7; color: white; }
</style>
</head>

        'ㅍㅜㅇㅅㅓㅇ', 'ㅍㅜㅇㅅㅡㅂ', 'ㅍㅕㅇㅅㅏㅇ', 'ㅍㅣㄹㄹㅡㅁ', 'ㅍㅣㄹㄷㅗㄱ',
        'ㅍㅜㅇㅈㅏㄱ', 'ㅍㅜㅇㅈㅓㄴ', 'ㅍㅜㅇㅎㅑㅇ', 'ㅍㅜㄹㅇㅣㅍ', 'ㅍㅣㄹㅅㅡㅇ',
        'ㅍㅏㅣㅈㅓㄴ', 'ㅍㅕㅣㅇㅓㅂ', 'ㅍㅕㅣㅇㅣㄴ', 'ㅍㅗㄷㅗㅈㅜ', 'ㅍㅣㅇㅏㄴㅗ',
        // ㅎ
        'ㅎㅏㄱㅁㅜㄴ', 'ㅎㅏㄴㄱㅜㄱ', 'ㅎㅏㄴㄱㅡㄹ', 'ㅎㅏㅂㄱㅕㄱ', 'ㅎㅏㅂㅂㅓㅂ',
        'ㅎㅏㅇㄱㅗㅇ', 'ㅎㅏㅇㅂㅗㄱ', 'ㅎㅕㅂㄹㅕㄱ', 'ㅎㅜㄹㄹㅕㄴ', 'ㅎㅓㄴㅂㅓㅂ',
        'ㅎㅕㄴㅅㅣㄹ', 'ㅎㅕㄹㅇㅏㅂ', 'ㅎㅕㄹㅈㅓㄴ', 'ㅎㅏㅁㅈㅓㅇ', 'ㅎㅏㅂㅈㅏㅇ',
        'ㅎㅏㅂㅊㅏㅇ', 'ㅎㅏㄴㅂㅗㄱ', 'ㅎㅏㄴㅂㅏㄹ', 'ㅎㅗㄴㄹㅏㄴ', 'ㅎㅡㅂㅇㅕㄴ',
        'ㅎㅏㄴㅅㅣㄱ', 'ㅎㅡㄱㅂㅏㄹ', 'ㅎㅕㄱㅁㅕㅇ', 'ㅎㅕㅂㅈㅓㅇ', 'ㅎㅕㅇㅂㅓㄹ',
        'ㅎㅕㅇㅂㅓㅂ', 'ㅎㅏㅇㅁㅏㄴ', 'ㅎㅓㄴㅅㅣㄴ', 'ㅎㅓㄴㅎㅕㄹ', 'ㅎㅓㅁㄷㅏㅁ',
        'ㅎㅏㄴㅈㅓㅇ', 'ㅎㅏㄱㄱㅡㅂ', 'ㅎㅏㄱㄹㅕㄱ', 'ㅎㅏㄱㅂㅓㄹ', 'ㅎㅏㅇㅅㅓㅇ',
        'ㅎㅕㅇㄴㅣㅁ', 'ㅎㅜㄴㅈㅏㅇ', 'ㅎㅏㅂㅅㅜㄱ', 'ㅎㅏㅂㅅㅏㄴ', 'ㅎㅏㄴㅌㅏㄴ',
        'ㅎㅗㄴㄷㅗㄴ', 'ㅎㅗㄴㄷㅗㅇ', 'ㅎㅏㅣㅁㅜㄹ', 'ㅎㅏㅣㅂㅕㄴ', 'ㅎㅗㅏㅂㅜㄴ',
        'ㅎㅗㅏㅈㅏㅇ', 'ㅎㅗㅣㅂㅗㄱ', 'ㅎㅕㅣㅅㅓㅇ', 'ㅎㅏㅅㅜㄷㅗ', 'ㅎㅏㅁㅗㄴㅣ'
    ];

    let targetWord = '';
    let currentRow = 0;
    let currentCol = 0;
    let board = [];
    let gameOver = false;

    // 게임 초기화
    function initGame() {
        targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        currentRow = 0;
        currentCol = 0;
        board = Array(6).fill('').map(() => Array(6).fill(''));
        gameOver = false;
        
        renderGrid();
        resetKeyboard();
    }

    // 그리드 렌더링
    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 6; c++) {
                const cell = document.createElement('div');
                cell.id = `cell-${r}-${c}`;
                cell.className = 'cell';
                if (board[r][c] !== '') {
                    cell.textContent = board[r][c];
                    cell.classList.add('filled');
                }
                grid.appendChild(cell);
            }
        }
    }

    // 키보드 색상 초기화
    function resetKeyboard() {
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            key.classList.remove('correct', 'present', 'absent');
        });
    }

    // 키 입력 처리
    function handleKey(key) {
        if (gameOver) return;

        if (key === 'Enter') {
            submitRow();
        } else if (key === 'Backspace') {
            deleteLetter();
        } else {
            addLetter(key);
        }
    }

    // 자음/모음 추가
    function addLetter(letter) {
        if (currentCol < 6) {
            board[currentRow][currentCol] = letter;
            const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
            cell.textContent = letter;
            cell.classList.add('filled');
            currentCol++;
        }
    }

    // 글자 삭제
    function deleteLetter() {
        if (currentCol > 0) {
            currentCol--;
            board[currentRow][currentCol] = '';
            const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
            cell.textContent = '';
            cell.classList.remove('filled');
        }
    }

    // 줄 제출 및 정답 확인
    function submitRow() {
        if (currentCol !== 6) {
            alert('글자를 모두 채워주세요!');
            return;
        }

        const guess = board[currentRow];
        const targetArr = targetWord.split('');
        let colors = Array(6).fill('absent');
        let targetCount = {};

        // 정답 단어의 자모음 개수 카운트
        for (let char of targetArr) {
            targetCount[char] = (targetCount[char] || 0) + 1;
        }

        // 1차 검사: 초록색 (자리도 맞고 글자도 맞는 경우)
        for (let i = 0; i < 6; i++) {
            if (guess[i] === targetArr[i]) {
                colors[i] = 'correct';
                targetCount[guess[i]]--;
            }
        }

        // 2차 검사: 노란색 (글자는 맞지만 자리가 틀린 경우)
        for (let i = 0; i < 6; i++) {
            if (colors[i] !== 'correct' && targetCount[guess[i]] > 0) {
                colors[i] = 'present';
                targetCount[guess[i]]--;
            }
        }

        // 셀과 키보드에 색상 적용
        let correctCount = 0;
        for (let i = 0; i < 6; i++) {
            const cell = document.getElementById(`cell-${currentRow}-${i}`);
            cell.classList.add(colors[i]);
            updateKeyboardColor(guess[i], colors[i]);
            if (colors[i] === 'correct') correctCount++;
        }

        // 게임 결과 처리
        setTimeout(() => {
            if (correctCount === 6) {
                alert('정답입니다! 🎉\n오른쪽 위 새로고침 버튼을 눌러 다시 시작해보세요.');
                gameOver = true;
            } else {
                currentRow++;
                currentCol = 0;
                if (currentRow === 6) {
                    alert(`게임 오버! 😢\n정답은 [ ${targetWord} ] 입니다.`);
                    gameOver = true;
                }
            }
        }, 300);
    }

    // 키보드 버튼 색상 업데이트
    function updateKeyboardColor(letter, status) {
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            if (key.textContent === letter) {
                // 초록색이 이미 적용되어 있다면 덮어쓰지 않음
                if (key.classList.contains('correct')) return;
                // 노란색이 이미 적용되어 있는데, 회색이 들어오면 무시
                if (key.classList.contains('present') && status === 'absent') return;
                
                key.classList.remove('present', 'absent');
                key.classList.add(status);
            }
        });
    }

    // 물리적 키보드 입력 지원
    document.addEventListener('keydown', (e) => {
        const keyMap = {
            'q':'ㅂ', 'w':'ㅈ', 'e':'ㄷ', 'r':'ㄱ', 't':'ㅅ', 'y':'ㅛ', 'u':'ㅕ', 'i':'ㅑ',
            'a':'ㅁ', 's':'ㄴ', 'd':'ㅇ', 'f':'ㄹ', 'g':'ㅎ', 'h':'ㅗ', 'j':'ㅓ', 'k':'ㅏ', 'l':'ㅣ',
            'z':'ㅋ', 'x':'ㅌ', 'c':'ㅊ', 'v':'ㅍ', 'b':'ㅠ', 'n':'ㅜ', 'm':'ㅡ'
        };
        if (e.key === 'Enter') handleKey('Enter');
        else if (e.key === 'Backspace') handleKey('Backspace');
        else if (keyMap[e.key.toLowerCase()]) handleKey(keyMap[e.key.toLowerCase()]);
        // 한글 입력 상태일 때 직접 입력
        else if (Object.values(keyMap).includes(e.key)) handleKey(e.key);
    });

    // 시작
    initGame();
</script>
